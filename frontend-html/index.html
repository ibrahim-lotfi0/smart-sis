<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart SIS | Login</title>
  <meta name="description" content="Smart University Management System – Secure Login Portal" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .blob3 {
      position:fixed; width:400px; height:400px;
      background:radial-gradient(circle,rgba(162,155,254,0.12) 0%,transparent 70%);
      top:50%; left:50%; transform:translate(-50%,-50%);
      animation:float1 12s ease-in-out infinite;
      pointer-events:none;
    }
  </style>
</head>
<body>
  <div class="bg-animated"></div>
  <div class="blob3"></div>

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <img src="images/logo.png" alt="Smart SIS Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;" />
      </div>

      <h1 class="login-title">Smart SIS</h1>
      <p class="login-subtitle">Welcome back! Sign in to your account</p>

      <!-- Alert -->
      <div class="alert alert-error" id="login-alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="login-alert-msg">Invalid credentials. Please try again.</span>
      </div>

      <!-- Form -->
      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-icon-wrap">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input class="form-input" type="email" id="email" placeholder="your@university.edu" required autocomplete="off" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-icon-wrap">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input class="form-input" type="password" id="password" placeholder="••••••••" required />
          </div>
        </div>

        <button class="btn btn-primary" id="login-btn" type="submit">
          Sign In
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </form>

      <!-- Footer info can go here -->
      <div style="margin-top:1.5rem; text-align:center; color:var(--text-secondary); font-size:0.8rem;">
        &copy; 2026 Smart SIS University Management. All Rights Reserved.
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    (function() {
      const auth = getAuth();
      if (auth.token) redirectByRole(auth.role);
    })();

    // Real login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const alert = document.getElementById('login-alert');
      const alertMsg = document.getElementById('login-alert-msg');

      btn.innerHTML = '<span class="spinner"></span> Signing in...';
      btn.disabled = true;
      alert.classList.remove('show');

      try {
        const data = await apiLogin(
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        saveAuth(data);
        localStorage.removeItem('sis_demo');
        redirectByRole(data.role);
      } catch (err) {
        alertMsg.textContent = err.message || 'Login failed. Please try again.';
        alert.classList.add('show');
        btn.innerHTML = 'Sign In <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
